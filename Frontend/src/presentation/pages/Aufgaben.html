<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App – Aufgaben</title>

    <!-- CDNs -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- Lokales CSS (relativ zu /pages/) -->
    <link href="../styles/style-aufgaben.css" rel="stylesheet">

    <!-- jQuery + Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Lokale Scripts (relativ zu /pages/) -->
    <script type="module" src="../../application/lang.js"></script>
    <script type="module" src="../../application/Aufgaben.js"></script>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
    <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="../assets/Download-removebg-preview.png" alt="To Do App Logo" width="40" height="40" class="mr-2" />
        <span class="h4 mb-0 ml-2 font-weight-bold">To Do App</span>
    </a>
    <div class="ml-auto d-flex align-items-center">
        <button id="profileBtn" class="btn btn-outline-secondary mr-3" data-i18n="profile">
            <i class="fas fa-user"></i> Profil
        </button>
        <button id="logoutBtn" class="btn btn-outline-danger" data-i18n="logout">
            <i class="fas fa-sign-out-alt"></i> ausloggen
        </button>
    </div>
</nav>

<div class="container mt-5">
    <select id="lang-select" class="custom-select ml-3 w-auto">
        <option value="de">Deutsch</option>
        <option value="en">English</option>
    </select>

    <h1 class="text-center mb-4" data-i18n="my_tasks">Meine Aufgaben</h1>

    <!-- Aufgabenformular -->
    <form id="taskForm" class="mb-4">
        <div class="form-group">
            <input type="text" id="taskTitle" class="form-control" placeholder="Fügen Sie eine Aufgabe ein" required data-i18n-placeholder="task_input">
        </div>
        <div class="form-group mt-2">
            <textarea id="taskDetails" class="form-control" placeholder="fügen Sie eine Beschreibung ein" rows="3" data-i18n-placeholder="task_description"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-2" data-i18n="add_task">Aufgabe hinzufügen</button>
    </form>

    <!-- Aufgabenliste -->
    <ul class="list-group" id="taskList"></ul>
</div>

<!-- Modal: Aufgabendetails -->
<div class="modal fade" id="taskModal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="taskModalLabel" data-i18n="task_description_title">Beschreibung der Aufgabe</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Schließen">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <textarea id="modalTaskDetails" class="form-control" rows="5"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal" data-i18n="close">Schließen</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Profil -->
<div class="modal fade" id="profileModal" tabindex="-1" aria-labelledby="profileModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="profileModalLabel">Benutzer Info</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Schließen">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <p><strong data-i18n="name_label">Name:</strong> Jean Dupont</p>
                <p><strong data-i18n="email_label">Email:</strong> jean.dupont@example.com</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal" data-i18n="close">Schließen</button>
            </div>
        </div>
    </div>
</div>

</body>
<script type="module" src="../../application/Aufgaben.js"></script>

</html>
