<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App – Aufgaben</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="style-aufgaben.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Aufgaben.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
    <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="Download-removebg-preview.png" alt="To Do App Logo" width="40" height="40" class="mr-2" />
        <span class="h4 mb-0 ml-2 font-weight-bold">To Do App</span>
    </a>
    <div class="ml-auto d-flex align-items-center">
        <button id="profileBtn" class="btn btn-outline-secondary mr-3">
            <i class="fas fa-user"></i> Profil
        </button>
        <button id="logoutBtn" class="btn btn-outline-danger">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</nav>
<div class="container mt-5">
    <h1 class="text-center mb-4">Meine Aufgaben</h1>

    <!-- Formulaire d'ajout de tâche -->
    <form id="taskForm" class="mb-4">
        <div class="form-group">
            <input type="text" id="taskTitle" class="form-control" placeholder="Fügen Sie eine Aufgabe ein" required>
        </div>
        <div class="form-group mt-2">
            <textarea id="taskDetails" class="form-control" placeholder="fügen Sie eine Beschreibung ein" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-2">Aufgabe hinzufügen</button>
    </form>

    <!-- Liste des tâches -->
    <ul class="list-group " id="taskList"></ul>
</div>

<!-- Modal pour afficher/modifier les détails -->
<div class="modal fade" id="taskModal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="taskModalLabel">Beschreibung der Aufgabe</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Fermer">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <textarea id="modalTaskDetails" class="form-control" rows="5"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">schließen</button>
            </div>
        </div>
    </div>
</div>
<!-- Modal Profil -->
<div class="modal fade" id="profileModal" tabindex="-1" aria-labelledby="profileModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="profileModalLabel">Profil Utilisateur</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Fermer">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <p><strong>Nom :</strong> Jean Dupont</p>
                <p><strong>Email :</strong> jean.dupont@example.com</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Schließen</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
