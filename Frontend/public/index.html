
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDo App – Login</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style-login.css" rel="stylesheet" />
  <script defer src="lang.js"></script>
  <script defer src="Login.js"></script>
</head>
<body>

<!-- Auswahl der Sprache -->

<div class="login-container card text-center p-4 mx-auto mt-5" style="max-width: 400px;">
  <!-- div sprache -->
  <div class="language-bar">
    <label for="lang-select" class="mr-2">Language:</label>
    <select id="lang-select" class="custom-select w-auto d-inline-block">
      <option value="de">Deutsch</option>
      <option value="en">English</option>
    </select>
  </div>

  <img src="Download-removebg-preview.png" alt="To Do App Logo" class="login-logo mb-3" />
  <div class="card-body">
    <h3 class="card-title text-center mb-4" data-i18n="login_title">ToDo App Login</h3>

    <!-- Login form -->
    <form id="loginForm">
      <div class="form-group">
        <label for="username" data-i18n="username_label">Benutzername:</label>
        <input type="text" class="form-control" id="username" required />
      </div>
      <div class="form-group">
        <label for="password" data-i18n="password_label">Passwort:</label>
        <input type="password" class="form-control" id="password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn" data-i18n="login_button">Einloggen</button>
    </form>

    <!-- Register form -->
    <form id="registerForm" class="mt-4">
      <div class="form-group">
        <label for="regUsername" data-i18n="reg_username">Neuer Benutzername:</label>
        <input type="text" class="form-control" id="regUsername" required />
      </div>
      <div class="form-group">
        <label for="regPassword" data-i18n="reg_password">Neues Passwort:</label>
        <input type="password" class="form-control" id="regPassword" required />
      </div>
      <button type="submit" class="btn btn-secondary btn-block" data-i18n="register_button">Registrieren</button>
    </form>

    <div id="result" class="text-danger text-center mt-3"></div>
    <p id="registerResult" class="text-success mt-2"></p>
  </div>
</div>

</body>
</html>
