<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine To-Do Aufgaben</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="Aufgaben.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }
        .navbar-custom {
            background-color: #2196f3;
        }
        .task-item {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .task-item.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }
        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .add-task-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
        }
        .btn-add-task {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .task-content {
            flex-grow: 1;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4">
    <div class="container-fluid">
        <span class="navbar-brand">Meine Aufgaben</span>
        <button class="btn btn-outline-light ms-auto" id="logoutBtn">
            <i class="bi bi-box-arrow-right"></i> Abmelden
        </button>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-4">
    <!-- Task Input Modal Trigger -->
    <div class="add-task-container">
        <button class="btn btn-primary btn-add-task" data-bs-toggle="modal" data-bs-target="#taskModal">
            <i class="bi bi-plus-lg"></i>
        </button>
    </div>

    <!-- Tasks List -->
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Meine Aufgaben</h5>
                    <ul class="list-group list-group-flush" id="taskList">
                        <!-- Aufgabe 1 -->
                        <li class="list-group-item task-item d-flex align-items-center">
                            <input type="checkbox" class="task-checkbox me-3 form-check-input">
                            <div class="task-content" onclick="window.location.href='task-detail.html'">
                                Einkaufen gehen
                            </div>
                            <div>
                                <button class="btn btn-sm btn-outline-secondary me-2 edit-btn">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger delete-btn">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </li>

                        <!-- Aufgabe 2 -->
                        <li class="list-group-item task-item d-flex align-items-center">
                            <input type="checkbox" class="task-checkbox me-3 form-check-input">
                            <div class="task-content" onclick="window.location.href='task-detail.html'">
                                React lernen
                            </div>
                            <div>
                                <button class="btn btn-sm btn-outline-secondary me-2 edit-btn">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger delete-btn">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </li>

                        <!-- Aufgabe 3 -->
                        <li class="list-group-item task-item d-flex align-items-center">
                            <input type="checkbox" class="task-checkbox me-3 form-check-input">
                            <div class="task-content" onclick="window.location.href='task-detail.html'">
                                Arzttermin
                            </div>
                            <div>
                                <button class="btn btn-sm btn-outline-secondary me-2 edit-btn">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger delete-btn">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </li>

                        <!-- Aufgabe 4 -->
                        <li class="list-group-item task-item d-flex align-items-center">
                            <input type="checkbox" class="task-checkbox me-3 form-check-input">
                            <div class="task-content" onclick="window.location.href='task-detail.html'">
                                Rechnung bezahlen
                            </div>
                            <div>
                                <button class="btn btn-sm btn-outline-secondary me-2 edit-btn">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger delete-btn">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </li>

                        <!-- Aufgabe 5 -->
                        <li class="list-group-item task-item d-flex align-items-center">
                            <input type="checkbox" class="task-checkbox me-3 form-check-input">
                            <div class="task-content" onclick="window.location.href='task-detail.html'">
                                Sport machen
                            </div>
                            <div>
                                <button class="btn btn-sm btn-outline-secondary me-2 edit-btn">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger delete-btn">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </li>

                        <!-- Aufgabe 6 -->
                        <li class="list-group-item task-item d-flex align-items-center">
                            <input type="checkbox" class="task-checkbox me-3 form-check-input">
                            <div class="task-content" onclick="window.location.href='task-detail.html'">
                                Buch lesen
                            </div>
                            <div>
                                <button class="btn btn-sm btn-outline-secondary me-2 edit-btn">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger delete-btn">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </li>

                        <!-- Aufgabe 7 -->
                        <li class="list-group-item task-item d-flex align-items-center">
                            <input type="checkbox" class="task-checkbox me-3 form-check-input">
                            <div class="task-content" onclick="window.location.href='task-detail.html'">
                                Meeting vorbereiten
                            </div>
                            <div>
                                <button class="btn btn-sm btn-outline-secondary me-2 edit-btn">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger delete-btn">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Task Modal -->
<div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Neue Aufgabe</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addTaskForm">
                    <div class="mb-3">
                        <label for="taskInput" class="form-label">Aufgabenbeschreibung</label>
                        <input type="text" class="form-control" id="taskInput" required>
                    </div>
                    <div class="mb-3">
                        <label for="taskDetails" class="form-label">Details</label>
                        <textarea class="form-control" id="taskDetails" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                <button type="submit" form="addTaskForm" class="btn btn-primary">Hinzufügen</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Basic JS for functionality -->
<script>
    // Logout functionality
    document.getElementById('logoutBtn').addEventListener('click', function() {
        window.location.href = 'login.html';
    });

    // Task completion toggle
    document.querySelectorAll('.task-checkbox').forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const taskItem = this.closest('.task-item');
            taskItem.classList.toggle('completed');

            // Prevent redirection when clicking the checkbox
            event.stopPropagation();
        });
    });

    // Task click redirection (for the content area)
    document.querySelectorAll('.task-content').forEach(task => {
        task.addEventListener('click', function() {
            window.location.href = 'task-detail.html';
        });
    });
</script>
</body>
</html>
